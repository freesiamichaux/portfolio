        <section class="conatct py-5">
            <div class="container">

                    <div class="col">
                        <h2 class="text-center">Contact</h2>
                    </div>
                </div>
                
                <div class="row mb-5">
                    <div class="col">
                        <p class="text-center fs-5">Envie de travailler ensemble sur des projets ? Contactez-moi !</p>
                    </div>
                </div>
                <!-- Contact form -->
                <div class="row mb-md-5 d-flex justify-content-center">
                    <div class="col-12 col-md-6">
                        <form action="https://api.web3forms.com/submit" method="POST" class="row gy-4" target="_blank">

                            <input type="hidden" name="access_key" value="aa3b91c7-fc93-4ffb-b229-ce4f1f9a0f8a">
                            <input type="checkbox" name="botcheck" style="display:none;">
                            <input type="hidden" name="subject" value="Nouveau message depuis mon portfolio">

                            <div class="col-6">
                                <label for="name" class="form-label">Nom</label>
                                <input type="text" class="form-control" name="name" id="name" placeholder="Nom complet" required>
                            </div>

                            <div class="col-6">
                                <label for="email" class="form-label">Email</label>
                                <input type="email" class="form-control" name="email" id="email" placeholder="exemple@email.com" required>
                            </div>

                            <div class="col-12">
                                <label for="message" class="form-label">Message</label>
                                <textarea class="form-control" name="message" id="message" rows="8" placeholder="Dites-moi ce que vous avez en tête..." required></textarea>
                            </div>

                            <div class="col-12 d-flex justify-content-center">
                                <button type="submit" class="btn btn-primary w-25 p-2 rounded-pill shadow-sm">Envoyer</button>
                            </div>
                        </form>
                    </div>
                </div>
            </div>
        </section>
